spring:
  application:
    name: worktime-tracker

  datasource:
    url: jdbc:postgresql://localhost:5432/worktime_tracker
    username: postgres
    password: 123456

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/WorkTimeApp

server:
  port: 9090